<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description"
    content="Velo is a next-generation local music player prioritizing privacy, speed, and premium UI. Ad-free, tracking-free, pure music experience.">
  <meta name="keywords"
    content="music player, local music, privacy music app, offline music, flac player, velo music, no ads music player, premium music ui">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://velo-music.web.app/">
  <meta property="og:title" content="Velo Music Player | Privacy, Speed, Premium UI">
  <meta property="og:description"
    content="Rediscover your music with Velo. The high-performance, private, and beautiful local music player.">
  <meta property="og:image" content="assets/images/hero.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://velo-music.web.app/">
  <meta property="twitter:title" content="Velo Music Player | Privacy, Speed, Premium UI">
  <meta property="twitter:description"
    content="Rediscover your music with Velo. The high-performance, private, and beautiful local music player.">
  <meta property="twitter:image" content="assets/images/hero.png">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="velo_web">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Velo Music Player | Privacy, Speed, Premium UI</title>
  <link rel="manifest" href="manifest.json">
</head>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
